<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital NP Store</title>

<style>
body {font-family: Arial; margin:0; background:#f4f4f4;}
header {background:#111; color:#fff; text-align:center; padding:15px;}
.products {display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px;}
.card {background:#fff; padding:15px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
.card img {width:100%; height:200px; object-fit:cover;}
button {background:#28a745; color:#fff; padding:10px; border:none; border-radius:5px; cursor:pointer;}
.cart-btn {position:fixed; right:10px; top:10px; background:#000; color:#fff; padding:10px;}
.cart-page {position:fixed; right:0; top:0; width:320px; height:100%; background:#fff; padding:15px; box-shadow:-2px 0 10px rgba(0,0,0,0.2); display:none;}
input, textarea {width:100%; padding:8px; margin:5px 0;}
</style>

</head>

<body>

<header>
<h1>📱 Digital NP Store</h1>
<p>Mobiles | Laptops | Ncell Services</p>
</header>

<div class="cart-btn" onclick="toggleCart()">🛒 Cart (<span id="count">0</span>)</div>

<div class="products" id="product-list"></div>

<div class="cart-page" id="cartPage">
<h2>Your Cart</h2>
<div id="cartItems"></div>

<h3>Customer Details</h3>
<input type="text" id="name" placeholder="Full Name">
<input type="text" id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="orderNow()">Order (Cash on Delivery)</button>

</div>

<script>
let cart=[];

const products=[
{name:"Samsung Galaxy S23",price:120000,img:"https://via.placeholder.com/300",desc:"Flagship Samsung phone"},
{name:"Redmi Note 13",price:30000,img:"https://via.placeholder.com/300",desc:"Budget phone"},
{name:"Vivo V29",price:50000,img:"https://via.placeholder.com/300",desc:"Camera phone"},
{name:"Oppo Reno 10",price:55000,img:"https://via.placeholder.com/300",desc:"Stylish phone"},
{name:"Dell Inspiron 15",price:85000,img:"https://via.placeholder.com/300",desc:"Powerful laptop"},
{name:"HP Pavilion",price:95000,img:"https://via.placeholder.com/300",desc:"Premium laptop"},
{name:"Lenovo IdeaPad",price:70000,img:"https://via.placeholder.com/300",desc:"Affordable laptop"},
{name:"Asus VivoBook",price:80000,img:"https://via.placeholder.com/300",desc:"Slim laptop"}
];

function loadProducts(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<h4>Rs. ${p.price}</h4>
<button onclick="addToCart(${i})">Add to Cart</button>
</div>
`;
});
document.getElementById("product-list").innerHTML=html;
}

function addToCart(i){
cart.push(products[i]);
updateCart();
}

function updateCart(){
document.getElementById("count").innerText=cart.length;

let html="";
cart.forEach(item=>{
html+=`<p>${item.name} - Rs.${item.price}</p>`;
});
document.getElementById("cartItems").innerHTML=html;
}

function toggleCart(){
let cartPage=document.getElementById("cartPage");
cartPage.style.display=cartPage.style.display==="block"?"none":"block";
}

function orderNow(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(!name || !phone || !address){
alert("Please fill all details");
return;
}

let text="🛒 Order Details:%0A";
cart.forEach(item=>{
text+=item.name+" - Rs."+item.price+"%0A";
});

text+="%0A👤 Name: "+name;
text+="%0A📞 Phone: "+phone;
text+="%0A📍 Address: "+address;

window.open("https://wa.me/97798XXXXXXXX?text="+text);
}
loadProducts();
</script>

</body>
</html>
